apiVersion: v1
kind: Namespace
metadata:
  name: hermes-factoftheday
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fact-of-the-day
  namespace: hermes-factoftheday
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: fact-of-the-day
  template:
    metadata:
      labels:
        app: fact-of-the-day
    spec:
      # hostNetwork bypasses Calico CNI (which is currently failing with an
      # unauthorized token). Remove once the calico-node DaemonSet is restarted
      # and Calico recovers.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - fact-of-the-day
              topologyKey: kubernetes.io/hostname
      containers:
      - name: fact-of-the-day
        image: ghcr.io/hermes-jarvis/fact-of-the-day:main
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: fact-of-the-day-service
  namespace: hermes-factoftheday
spec:
  type: NodePort
  selector:
    app: fact-of-the-day
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30012
