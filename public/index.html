<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fact of the Day</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        h1 { margin-bottom: 2rem; font-weight: 300; letter-spacing: 2px; }
        #fact { font-size: 1.5rem; line-height: 1.6; margin-bottom: 2rem; min-height: 100px; }
        .footer { font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fact of the Day</h1>
        <div id="fact">Loading interesting fact...</div>
        <div class="footer">Data provided by uselessfacts.jsph.pl</div>
    </div>
    <script>
        async function fetchFact() {
            try {
                const response = await fetch('/api/fact');
                const data = await response.json();
                document.getElementById('fact').innerText = data.text;
            } catch (error) {
                document.getElementById('fact').innerText = "Oops! Couldn't load the fact today.";
            }
        }
        fetchFact();
    </script>
</body>
</html>
